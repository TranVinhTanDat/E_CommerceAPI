# ===== LOCAL DEV PROFILE =====
# Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=local
# Overrides cloud datasource + provides dummy secrets so the app can boot locally.

# Local MySQL (Docker compose 'db' service -> host port 3308)
spring.datasource.url=jdbc:mysql://localhost:3308/ecommercewebapi?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.jpa.hibernate.ddl-auto=update

# Dummy secrets (features that need real keys won't work, but app boots)
JWT_SECRET=local-dev-dummy-jwt-secret-change-me-0123456789
MOMO_SECRET_KEY=local-dummy-momo-secret

# Mail (dummy - sending emails will fail, but startup is fine)
SPRING_MAIL_USERNAME=dummy@example.com
SPRING_MAIL_PASSWORD=dummy

# Google OAuth2 (dummy - Google login won't work, but startup is fine)
GOOGLE_OAUTH2_CLIENT_ID=dummy-client-id
GOOGLE_OAUTH2_CLIENT_SECRET=dummy-client-secret
